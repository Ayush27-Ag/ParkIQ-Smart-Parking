<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | ParkIQ</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/bookings.css">
  <link rel="stylesheet" href="css/settings.css">
</head>

<body>

<!-- 🔥 HEADER -->
<header class="header">
  <h2>ParkIQ</h2>

  <!-- PROFILE -->
  <div class="profile-wrapper">
    <div class="profile-btn" id="profileBtn">P</div>

    <div class="dropdown-menu" id="dropdownMenu">
      <div class="user-info">
        <h4 id="menuName">User</h4>
        <p id="menuEmail">email</p>
      </div>

      <hr>

      <p onclick="goDashboard()">🏠 Dashboard</p>
      <p onclick="findCar()">🚗 Find My Car</p>
      <p onclick="goBookings()">📜 My Bookings</p>
      <p onclick="logout()">🚪 Logout</p>
    </div>
  </div>
</header>


<!-- 🔥 MAIN -->
<div class="main-container">

  <h1 class="page-title">⚙️ Settings</h1>

  <!-- PROFILE INFO -->
  <div class="settings-card">
    <h3>Profile</h3>

    <label>First Name</label>
    <input id="firstName" disabled>

    <label>Last Name</label>
    <input id="lastName" disabled>

    <label>Email</label>
    <input id="userEmail" disabled>
  </div>

  <!-- CHANGE PASSWORD -->
  <div class="settings-card">
    <h3>Change Password</h3>

    <label>New Password</label>
    <input type="password" id="newPass" placeholder="Enter new password">

    <button id="changePassBtn" onclick="changePass()">Update Password</button>

    <p id="status"></p>
  </div>

</div>

<!-- JS -->
<script type="module" src="js/settings.js"></script>
<script type="module" src="js/change-password.js"></script>

</body>
</html>
