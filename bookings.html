<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Bookings | ParkIQ</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/bookings.css">
</head>

<body>

<!-- 🔥 HEADER -->
<header class="header">
  <h2>ParkIQ</h2>

  <!-- PROFILE -->
  <div class="profile-wrapper">
    <div class="profile-btn" id="profileBtn">P</div>

    <!-- DROPDOWN -->
    <div class="dropdown-menu" id="dropdownMenu">

      <div class="user-info">
        <h4 id="menuName">User</h4>
        <p id="menuEmail">email</p>
      </div>

      <hr>

      <p onclick="goDashboard()">🏠 Dashboard</p>
      <p onclick="findCar()">🚗 Find My Car</p>
      <p onclick="goSettings()">⚙️ Settings</p>
      <p onclick="logout()">🚪 Logout</p>

    </div>
  </div>

</header>


<!-- 🔥 MAIN -->
<div class="main-container">

  <h1 class="page-title">📜 My Bookings</h1>

  <!-- BOOKINGS LIST -->
  <div id="bookingList" class="booking-grid">
    Loading bookings...
  </div>

</div>


<!-- JS -->
<script type="module" src="js/bookings.js"></script>

</body>
</html>
